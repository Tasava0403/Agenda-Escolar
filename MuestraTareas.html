<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de tareas</title>

  <link rel="icon" type="image/png" href="/calendario.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <main class="main-card">

    <div id="menu-container"></div>

    <!-- Encabezado -->
    <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-4">

      <button class="btn-home"
              data-bs-toggle="modal"
              data-bs-target="#modalMenu">
        🏠
      </button>

      <h1 class="edit-title m-0">
        Agenda Escolar
      </h1>

      <!-- Botón nueva tarea -->
      <button class="btn-modify px-4"
              onclick="window.location.href='registroTareas.html'">

        + Nueva tarea

      </button>

    </div>

    <!-- BUSCADOR -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">

      <h2 class="h5 m-0">
        Lista de tareas
      </h2>

      <input
        id="buscador"
        type="text"
        class="form-control form-control-sm edit-input"
        style="max-width: 280px;"
        placeholder="Buscar tarea">

    </div>

    <!-- TABLA -->
    <div class="table-responsive">

      <table class="table text-center align-middle">

        <thead>
          <tr>
            <th>Materia</th>
            <th>Tarea</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th class="text-nowrap">Acción</th>
          </tr>
        </thead>

        <tbody id="tablaTareasBody"></tbody>

      </table>

    </div>

    <!-- SIN TAREAS -->
    <div id="sinTareas"
         class="text-center text-muted py-4 d-none">

      No hay tareas registradas todavía.

    </div>

  </main>

  <!-- MODAL VER -->
  <div class="modal fade"
       id="modalVer"
       tabindex="-1"
       aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

      <div class="modal-content">

        <div class="modal-header">

          <h5 class="modal-title">
            Detalle de la tarea
          </h5>

          <button class="btn-close"
                  data-bs-dismiss="modal"></button>

        </div>

        <div class="modal-body">

          <p>
            <strong>Materia:</strong>
            <span id="verMateria"></span>
          </p>

          <p>
            <strong>Tarea:</strong>
            <span id="verTarea"></span>
          </p>

          <p>
            <strong>Fecha:</strong>
            <span id="verFecha"></span>
          </p>

          <p class="mb-0">
            <strong>Estado:</strong>
            <span id="verEstado"></span>
          </p>

        </div>

        <div class="modal-footer">

          <button class="btn btn-secondary"
                  data-bs-dismiss="modal">

            Cerrar

          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS EXTERNO -->
  <script src="muestraTareas.js"></script>

</body>
</html>
