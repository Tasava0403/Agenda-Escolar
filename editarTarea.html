<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Editar tarea</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background: linear-gradient(135deg,#d9c7ff,#9be7c4);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Segoe UI;
    }

    .card-edit{
      width:500px;
      background:white;
      border-radius:20px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
    }

    .titulo{
      color:#6a42c2;
      font-weight:bold;
      margin-bottom:25px;
    }

    .btn-guardar{
      background:#6a42c2;
      color:white;
      border:none;
      border-radius:30px;
      padding:12px;
      width:100%;
      font-weight:bold;
    }

    .btn-guardar:hover{
      background:#5935a5;
    }

  </style>
</head>

<body>

  <div class="card-edit">

    <h2 class="titulo text-center">
      Editar tarea
    </h2>

    <form id="formEditar">

      <div class="mb-3">
        <label>Tarea</label>

        <input
          type="text"
          id="descripcion"
          class="form-control"
          required>
      </div>

      <div class="mb-3">
        <label>Fecha</label>

        <input
          type="date"
          id="fecha"
          class="form-control"
          required>
      </div>

      <div class="mb-3">

        <label>Estado</label>

        <select id="estado" class="form-select">

          <option value="Pendiente">
            Pendiente
          </option>

          <option value="Completado">
            Completado
          </option>

        </select>

      </div>

      <div class="mb-4">

        <label>Nota</label>

        <input
          type="text"
          id="nota"
          class="form-control">

      </div>

      <button class="btn-guardar">
        Guardar cambios
      </button>

    </form>

  </div>

  <script src="editarTarea.js"></script>

</body>
</html>
